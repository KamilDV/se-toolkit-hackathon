<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flashcards</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .input-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #357abd;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 10px 0;
            font-style: italic;
            color: var(--primary-color);
        }

        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .flashcard {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: pointer;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            position: relative;
            perspective: 1000px;
        }

        .flashcard:hover {
            transform: translateY(-5px);
        }

        .card-content {
            font-weight: 500;
        }

        .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .answer {
            display: none;
            color: var(--primary-color);
        }

        .flashcard.flipped .question { display: none; }
        .flashcard.flipped .answer { display: block; }
        .flashcard.flipped .label { color: var(--primary-color); }
    </style>
</head>
<body>

    <header>
        <h1>AI Flashcards 🧠</h1>
        <p>Turn your notes into study cards in seconds.</p>
    </header>

    <div class="container">
        <div class="input-section">
            <textarea id="inputText" placeholder="Paste your lecture notes or study text here..."></textarea>
            <button id="generateBtn">Generate Flashcards</button>
            <div id="loader" class="loader">Generating magic... ✨</div>
        </div>

        <div id="flashcardsGrid" class="flashcards-grid">
            <!-- Cards will appear here -->
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const inputText = document.getElementById('inputText');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const flashcardsGrid = document.getElementById('flashcardsGrid');

        async function fetchFlashcards() {
            try {
                const response = await fetch(`${API_URL}/flashcards`);
                const cards = await response.json();
                renderCards(cards);
            } catch (error) {
                console.error('Error fetching cards:', error);
            }
        }

        function renderCards(cards) {
            flashcardsGrid.innerHTML = '';
            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'flashcard';
                cardEl.innerHTML = `
                    <div class="label">Question</div>
                    <div class="card-content question">${card.question}</div>
                    <div class="card-content answer">${card.answer}</div>
                `;
                cardEl.onclick = () => {
                    cardEl.classList.toggle('flipped');
                    const label = cardEl.querySelector('.label');
                    label.textContent = cardEl.classList.contains('flipped') ? 'Answer' : 'Question';
                };
                flashcardsGrid.appendChild(cardEl);
            });
        }

        generateBtn.onclick = async () => {
            const text = inputText.value.trim();
            if (!text) return alert('Please enter some text!');

            generateBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (response.ok) {
                    await fetchFlashcards();
                    inputText.value = '';
                } else {
                    alert('Generation failed. Check your API key or text length.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Is the backend running?');
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
            }
        };

        // Initial load
        fetchFlashcards();
    </script>
</body>
</html>
